name: archeres

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: archeres-backend
    env_file: .env
    ports:
      - "8080:8080"
    environment:
      - PORT=8080
      - DATABASE_PATH=/app/data/archeres.db
      - JWT_SECRET=${JWT_SECRET:-supersecretjwtkeyforarcheres2026}
    volumes:
      - archeres-db:/app/data
    restart: unless-stopped

  web:
    build:
      context: ./web
      dockerfile: Dockerfile
    container_name: archeres-web
    env_file: .env
    ports:
      - "3000:3000"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  archeres-db:
    name: archeres-db-volume
