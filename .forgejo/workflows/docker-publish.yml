name: Docker Publish on Release

on:
  release:
    types: [published]

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Forgejo Container Registry
        uses: docker/login-action@v3
        with:
          registry: repo.alexmaisa.my.id
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Backend Image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: true
          tags: |
            repo.alexmaisa.my.id/alexmaisa/archeres-backend:${{ github.event.release.tag_name }}
            repo.alexmaisa.my.id/alexmaisa/archeres-backend:latest

      - name: Build and push Web Image
        uses: docker/build-push-action@v5
        with:
          context: ./web
          file: ./web/Dockerfile
          push: true
          tags: |
            repo.alexmaisa.my.id/alexmaisa/archeres-web:${{ github.event.release.tag_name }}
            repo.alexmaisa.my.id/alexmaisa/archeres-web:latest
