name: arche

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: arche-backend
    ports:
      - "8080:8080"
    environment:
      - PORT=8080
      - DATABASE_PATH=/app/data/arche.db
      - JWT_SECRET=${JWT_SECRET:-supersecretjwtkeyforarche2026}
    volumes:
      - arche-db:/app/data
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: arche-frontend
    ports:
      - "3000:3000"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  arche-db:
    name: arche-db-volume
